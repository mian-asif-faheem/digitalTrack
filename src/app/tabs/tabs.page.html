<!-- Hidden ion-tab-bar keeps Ionic's tab router outlet working -->
<ion-tabs>
  <ion-tab-bar slot="bottom" class="routing-bar">
    <ion-tab-button tab="tab1" href="/tabs/tab1"></ion-tab-button>
    <ion-tab-button tab="tab2" href="/tabs/tab2"></ion-tab-button>
    @if (isSuperAdmin) {
      <ion-tab-button tab="tab4" href="/tabs/tab4"></ion-tab-button>
    }
    <ion-tab-button tab="tab3" href="/tabs/tab3"></ion-tab-button>
  </ion-tab-bar>
</ion-tabs>

<!-- Animated visual tab bar -->
<app-animated-tab-bar></app-animated-tab-bar>
